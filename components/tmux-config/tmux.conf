# ~/.tmux.conf — managed by dotmeow
# Requires tmux 3.2+

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Core ──────────────────────────────────────────────────────────────────────
# default-shell is set in ~/.config/tmux/local.conf (generated by meowctl apply)
# so the path is detected at install time rather than hardcoded here.
if-shell "test -f ~/.config/tmux/local.conf" "source-file ~/.config/tmux/local.conf"
# Strip meowctl's once-only guard from the pane environment so each new pane
# re-runs `meowctl hook shell` and gets starship/mise/zoxide initialised.
set-environment -gu _MEOWCTL_SHELL_DONE
set -g default-terminal "tmux-256color"
# Both overrides needed: tmux-256color for panes, xterm-256color for programs
# that probe $TERM directly (e.g. some editors inside tmux).
set -ga terminal-overrides ",tmux-256color:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g status-position top
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
# 0 ms escape-time; tmux-sensible also sets this — kept here to be explicit.
set -sg escape-time 0
set -g status-interval 5

# ── Vi mode ───────────────────────────────────────────────────────────────────
set -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
# y is handled by tmux-yank (loaded via TPM below); configure via @yank_action.
bind -T copy-mode-vi Y   send -X select-line \; send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi /   command-prompt -p "search down" "send -X search-forward '%%'"
bind -T copy-mode-vi ?   command-prompt -p "search up" "send -X search-backward '%%'"
bind -T copy-mode-vi Escape send -X cancel

# ── Pane navigation ───────────────────────────────────────────────────────────
# vim-tmux-navigator handles Ctrl-hjkl without prefix.
# prefix + hjkl as an explicit fallback.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane splits ───────────────────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# 's' intentionally shadows the default choose-tree binding.
bind s split-window -v -c "#{pane_current_path}"

# ── Pane resize (repeatable) ──────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ───────────────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind x kill-pane
bind X kill-window
bind z resize-pane -Z
bind , command-prompt -I "#W" "rename-window '%%'"

# ── Session management (sesh) ─────────────────────────────────────────────────
# PATH includes mise shims so sesh is found in the non-login popup environment.
bind d detach-client
bind w display-popup -E -w 80% -h 80% \
  "PATH=/opt/homebrew/bin:/usr/local/bin:$HOME/.local/share/mise/shims:$PATH; \
   selected=\$(sesh list --icons | fzf \
     --height 100% \
     --layout reverse \
     --border \
     --ansi \
     --exit-0 \
     --prompt '  ' \
     --header 'Sessions' 2>/dev/null); \
   [ -n \"\$selected\" ] && sesh connect \"\$selected\""

# ── Reload config ─────────────────────────────────────────────────────────────
# tmux-autoreload also reloads on file save; this bind is a manual fallback.
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Catppuccin theme ──────────────────────────────────────────────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
# Status bar background matches terminal background (#1e1e2e = catppuccin mocha base).
set -g @catppuccin_status_background "#1e1e2e"
# ofirgall/tmux-window-name drives automatic-rename; @catppuccin_window_*_text
# applies when the window name has not been overridden by the plugin.
set -g @catppuccin_window_current_text "#{b:pane_current_path}"
set -g @catppuccin_window_text "#{b:pane_current_path}"

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-left-length 100
set -g status-right-length 300

set -g status-left "#{E:@catppuccin_status_session} "

# Right: vpn | focus | keyboard | cpu | memory | battery | date | time
# All widgets are standalone shell scripts matching zjstatus-widgets format.
# Scripts output empty string when the widget should be hidden.
# Scripts use two trailing spaces as padding.
set -g status-right "\
#(~/.config/tmux/scripts/tmux-vpn.sh)\
#(~/.config/tmux/scripts/tmux-focus.sh)\
#(~/.config/tmux/scripts/tmux-keyboard.sh)\
#(~/.config/tmux/scripts/tmux-cpu.sh)\
#(~/.config/tmux/scripts/tmux-memory.sh)\
#(~/.config/tmux/scripts/tmux-battery.sh)\
#(~/.config/tmux/scripts/tmux-date.sh)\
#(~/.config/tmux/scripts/tmux-time.sh)"

# ── Window naming (ofirgall/tmux-window-name) ─────────────────────────────────
# Shows CWD basename at idle; active command name while a program runs.
# When this plugin is active it drives automatic-rename; the @catppuccin_window_*_text
# options above apply to windows not yet renamed by the plugin.
set -g automatic-rename on
set -g @tmux_window_name_use_tilde "True"
set -g @tmux_window_name_shells "['fish', 'bash', 'zsh']"

# ── URL picker (wfxr/tmux-fzf-url) ───────────────────────────────────────────
set -g @fzf-url-bind "u"
set -g @fzf-url-history-limit "2000"

# ── Copy hints (fcsonline/tmux-thumbs) ───────────────────────────────────────
set -g @thumbs-key "t"
set -g @thumbs-command "echo -n {} | pbcopy"

# ── Scrollback fuzzy search (roosta/tmux-fuzzback) ───────────────────────────
set -g @fuzzback-bind "F"

# ── Session persistence ───────────────────────────────────────────────────────
set -g @resurrect-capture-pane-contents "on"
set -g @resurrect-strategy-nvim "session"

# Disable continuum's status-right indicator to prevent it from overwriting
# the custom status bar built above.
set -g @continuum-restore "on"
set -g @continuum-save-interval "60"
set -g @continuum-status-interval "0"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
# TPM bootstrap (one-time):
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   Then launch tmux and press prefix + I
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "catppuccin/tmux"
set -g @plugin "ofirgall/tmux-window-name"
set -g @yank_action "copy-pipe-and-cancel"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "wfxr/tmux-fzf-url"
set -g @plugin "fcsonline/tmux-thumbs"
set -g @plugin "roosta/tmux-fuzzback"
set -g @plugin "b0o/tmux-autoreload"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

run "~/.tmux/plugins/tpm/tpm"
