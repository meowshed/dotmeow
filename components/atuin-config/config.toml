# atuin config — Catppuccin Mocha
#
# Local-only history. No cloud sync.
# Inline search style — results appear below the prompt.

# Search
style = "inline"
inline_height = 40
show_preview = true
search_mode = "fuzzy"
filter_mode_shell_up_key_binding = "session"
enter_accept = false
update_check = false

# History
db_path = "~/.local/share/atuin/history.db"

# Sync — disabled (local only)
auto_sync = false

# Theme — Catppuccin Mocha
[theme]
name = "catppuccin-mocha"

[theme.colors]
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
text = "#cdd6f4"
subtext0 = "#a6adc8"
subtext1 = "#bac2de"
surface0 = "#313244"
surface1 = "#45475a"
surface2 = "#585b70"
overlay0 = "#6c7086"
overlay1 = "#7f849c"
overlay2 = "#9399b2"
blue = "#89b4fa"
lavender = "#b4befe"
sapphire = "#74c7ec"
sky = "#89dceb"
teal = "#94e2d5"
green = "#a6e3a1"
yellow = "#f9e2af"
peach = "#fab387"
maroon = "#eba0ac"
red = "#f38ba8"
mauve = "#cba6f7"
pink = "#f5c2e7"
flamingo = "#f2cdcd"
rosewater = "#f5e0dc"
