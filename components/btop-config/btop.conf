#? Config file for btop

color_theme = "catppuccin-mocha"
theme_background = true
truecolor = true
force_tty = false
presets = "cpu:1:default,proc:0:default cpu:0:default,mem:0:default,net:0:default cpu:0:default,proc:0:default"
vim_keys = true
rounded_corners = true
terminal_sync = true
graph_symbol = "braille"
graph_symbol_cpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"
shown_boxes = "cpu mem net proc"
update_ms = 2000
proc_sorting = "cpu lazy"
proc_reversed = false
proc_tree = false
proc_colors = true
proc_gradient = true
proc_per_core = true
proc_mem_bytes = true
proc_cpu_graphs = true
proc_info_smaps = false
proc_left = false
proc_filter_kernel = false
proc_aggregate = false
keep_dead_proc_usage = false
cpu_graph_upper = "total"
cpu_graph_lower = "user"
cpu_invert_lower = true
cpu_single_graph = false
cpu_bottom = false
show_uptime = true
# Apple Silicon does not expose CPU power via btop's sensor APIs; field shows empty.
show_cpu_watts = false
check_temp = true
cpu_sensor = "Auto"
show_coretemp = true
cpu_core_map = ""
temp_scale = "celsius"
show_disks = true
only_physical = true
# macOS does not use /etc/fstab for normal mount tracking; Linux-only option.
use_fstab = false
zfs_hide_datasets = false
disk_free_priv = false
show_io_stat = true
io_mode = false
io_graph_combined = false
io_graph_speeds = ""
net_download = 100
net_upload = 100
net_auto = true
net_sync = false
net_iface = ""
base_10_bitrate = "Auto"
show_battery = true
selected_battery = "Auto"
show_battery_watts = true
log_level = "WARNING"
save_config_on_exit = false
