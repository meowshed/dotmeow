"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

command_timeout = 1000
scan_timeout = 100

format = """
$os\
$shlvl\
$username\
$directory\
$git_branch\
$git_commit\
$git_state\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$lua\
$python\
$mise\
$docker_context\
$container\
$jobs\
$cmd_duration\
$status\
$line_break\
$character\
"""

palette = 'catppuccin_mocha'

[palettes.default]

color_ok = 'bright-green'
color_danger = 'bright-red'
color_caution = 'bright-yellow'

color_os = 'red'
color_username = 'red'
color_directory = 'yellow'
color_git = 'cyan'
color_git_added = 'bright-green'
color_git_deleted = 'bright-red'
color_env = 'blue'
color_kubernetes = 'purple'
color_docker = 'blue'
color_shell = ''
color_container = ''
color_other = ''
color_time = ''
color_duration = ''

color_vimcmd_ok = 'green'
color_vimcmd_replace = 'purple'
color_vimcmd_visual = 'yellow'

[palettes.catppuccin_mocha]

color_ok = '#a6e3a1'
color_danger = '#f38ba8'
color_caution = '#f9e2af'

color_os = '#f38ba8'
color_username = '#f38ba8'
color_directory = '#f9e2af'
color_git = '#89dceb'
color_git_added = '#a6e3a1'
color_git_deleted = '#f38ba8'
color_env = '#89b4fa'
color_kubernetes = '#cba6f7'
color_docker = '#89b4fa'
color_shell = '#cdd6f4'
color_container = '#f38ba8'
color_other = '#bac2de'
color_time = '#cdd6f4'
color_duration = '#cdd6f4'

color_vimcmd_ok = '#a6e3a1'
color_vimcmd_replace = '#cba6f7'
color_vimcmd_visual = '#f9e2af'

[os]
disabled = false
style = "fg:color_os"
format = '[$symbol]($style)'
