format = '( [$symbol( $version)]($style) )'

[lua]
symbol = "¾░ó▒"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[shlvl]
symbol = "¾░ś¦"
style = "fg:color_caution"
format = '( [$symbol$shlvl]($style) )'
threshold = 2
disabled = false

[python]
symbol = "Ņśå"
style = "fg:color_env"
format = '( [$symbol( $version)( $virtualenv)]($style) )'
