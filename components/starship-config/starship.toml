pipestatus = true
symbol = '¾░ģÖ'
success_symbol = ''
not_executable_symbol = '¾░éŁ'
not_found_symbol = '¾░Źē'
sigint_symbol = '¾░ÉŖ'
signal_symbol = '¾▒Éŗ'
style = 'bold fg:color_danger'
recognize_signal_code = true

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:color_ok)'
error_symbol = '[ŌØ»](bold fg:color_danger)'
vimcmd_symbol = '[ŌØ«](bold fg:color_vimcmd_ok)'
