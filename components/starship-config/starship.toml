Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
Arch = "¾░Żć"
Artix = "¾░Żć"
EndeavourOS = "’åŚ"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "’ī¬"

[username]
show_always = false
style_user = "fg:color_username"
style_root = "bold fg:color_danger"
format = '[ $user ]($style)'

[directory]
style = "fg:color_directory"
read_only_style = "fg:color_directory"
repo_root_style = "bold fg:color_directory"
format = "[ $path ]($style)"
repo_root_format = "[ $before_root_path]($style)[$repo_root]($repo_root_style)[$path ]($style)"
read_only = " ’ĆŻ"
home_symbol = "~"
truncation_symbol = " ŌĆ”/"
truncation_length = 4
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_logical_path = true

[git_branch]
symbol = "’Éś"
style = "fg:color_git"
format = '( [$symbol $branch]($style) )'
only_attached = true
ignore_branches = []
truncation_length = 25
truncation_symbol = "..."
always_show_remote = false
disabled = false

[git_commit]
style = "fg:color_git"
format = "( [($tag)(@$hash)]($style) )"
commit_hash_length = 7
only_detached = true
tag_symbol = "¾░ō╝ "
tag_disabled = false
disabled = false

[git_status]
disabled = true

[git_metrics]
disabled = true

[git_state]
style = "fg:color_danger"
format = '([$state( $progress_current/$progress_total)]($style bold) )'
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
disabled = false

[nodejs]
symbol = "Ņ┤Ź"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[c]
symbol = "Ņś×"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[rust]
symbol = "¾▒śŚ"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[golang]
symbol = "¾░¤ō"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[php]
symbol = "Ņśł"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[java]
symbol = "Ņē¢"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[kotlin]
symbol = "Ņś┤"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[haskell]
symbol = ""
