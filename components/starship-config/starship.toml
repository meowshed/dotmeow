style = "fg:color_shell"

[container]
style = "fg:color_container"
format = '( [$symbol $name]($style) )'

[jobs]
symbol = "¾░Æŗ"
style = "fg:color_other"
format = '( [$symbol( $number)]($style) )'
symbol_threshold = 1
number_threshold = 1

[time]
disabled = true
time_format = "%R"
style = "fg:color_time"
format = '( [¾░öø $time]($style) )'

[cmd_duration]
